<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for shaina ❤️</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#fff5f5;--bg2:#ffe8e8;--red:#c0392b;--red-soft:#e07070;--red-pale:#f7c1c1;--red-soft2:#2a0a0a;--text-muted:#8a4040;--pf:Press Start 2P,monospace;}body{font-family:var(--pf);background:var(--bg);color:var(--text);min-height:100vh;max-width:420px;margin:0 auto;overflow-x:hidden}.deco-bg{position:fixed;top:0;left:0;right:0;bottom:0;background-image:radial-gradient(circle,var(--red-pale) 1px,transparent 1px);background-size:18px 18px;opacity:0.35;pointer-events:none;z-index:0}.page{display:none;position:relative;z-index:1;padding:24px 16px 90px;min-height:100vh}.page.active{display:block}.pixel-heart{font-size:36px;display:block;text-align:center;margin-bottom:12px;animation:pulse 1.2s infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}.main-title{font-size:13px;color:var(--red);text-align:center;line-height:2.2;letter-spacing:1px;margin:4px}.sub-title{font-size:6px;color:var(--text-muted);text-align:center;line-height:2;margin-bottom:8px}.name-tag{font-size:8px;color:var(--red-soft);text-align:center;margin-bottom:24px;letter-spacing:2px}.divider{height:4px;background:repeating-linear-gradient(90deg,var(--red-pale) 0,var(--red-pale) 4px,transparent 4px,transparent 8px);margin:14px 0}.song-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}.song-btn{background:#fff;border:2px solid var(--red-pale);color:var(--red-soft2);font-family:var(--pf);font-size:6px;padding:13px 12px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:background .1s;border-color:.1s;letter-spacing:.5px;line-height:1.8;width:100%}.song-btn:hover,.song-btn.active{background:var(--bg2);border-color:var(--red-soft)}.song-num{color:var(--red-soft);font-size:9px;min-width:20px}.song-name{color:var(--text);margin-bottom:3px}.song-artist{color:var(--text-muted);font-size:5.5px}.fav-badge{font-size:5px;background:var(--red-pale);color:#fff;padding:2px 6px;border-radius:8px;margin-left:auto}.lyrics-page{padding:24px 20px 80px;min-height:100vh;overflow-y:auto;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%)}.lyrics-content{text-align:center}.lyric-line{font-size:7px;line-height:2.5;margin-bottom:8px;color:var(--text-muted);opacity:0;animation:fadeIn .6s ease forwards}.lyric-line.highlight{color:var(--red);opacity:1}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.back-btn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--red-pale);color:#fff;border:none;padding:12px 24px;font-family:var(--pf);font-size:6px;cursor:pointer;z-index:10;border-radius:4px}.back-btn:hover{background:var(--red-soft)}nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--red-pale);display:flex;justify-content:space-around;padding:16px 8px;z-index:10}.nav-btn{background:none;border:none;font-family:var(--pf);font-size:6px;color:var(--text-muted);cursor:pointer;padding:8px 12px;transition:all .2s;border-radius:4px}.nav-btn:hover,.nav-btn.active{color:var(--red);background:var(--bg2)}.nav-icon{display:block;text-align:center;font-size:10px;margin-bottom:2px}.progress-container{position:fixed;bottom:68px;left:0;right:0;height:3px;background:var(--bg2);z-index:9}.progress-bar{height:100%;background:linear-gradient(90deg,var(--red-pale),var(--red-soft));width:0%;transition:width .3s}
</style>
</head>
<body>
<div class="deco-bg"></div>

<div id="home" class="page active">
<span class="pixel-heart">💝</span>
<div class="main-title">THIS WEBSITE IS FOR<br>THE ONE I LOVE</div>
<div class="sub-title">A little collection of our moments</div>
<div class="name-tag">FOR SHAINA</div>
<div class="divider"></div>
<div class="song-list">
<button class="song-btn" onclick="showLyrics(0)">
<span class="song-num">01</span>
<div>
<div class="song-name">Perfect</div>
<div class="song-artist">Ed Sheeran</div>
</div>
<span class="fav-badge">FAV</span>
</button>
<button class="song-btn" onclick="showLyrics(1)">
<span class="song-num">02</span>
<div>
<div class="song-name">Thinking Out Loud</div>
<div class="song-artist">Ed Sheeran</div>
</div>
</button>
<button class="song-btn" onclick="showLyrics(2)">
<span class="song-num">03</span>
<div>
<div class="song-name">All of Me</div>
<div class="song-artist">John Legend</div>
</div>
</button>
<button class="song-btn" onclick="showLyrics(3)">
<span class="song-num">04</span>
<div>
<div class="song-name">Lover</div>
<div class="song-artist">Taylor Swift</div>
</div>
<span class="fav-badge">FAV</span>
</button>
<button class="song-btn" onclick="showLyrics(4)">
<span class="song-num">05</span>
<div>
<div class="song-name">Until I Found You</div>
<div class="song-artist">Stephen Sanchez</div>
</div>
</button>
</div>
</div>

<div id="lyrics" class="page lyrics-page">
<div class="lyrics-content" id="lyrics-container"></div>
<button class="back-btn" onclick="goHome()">← BACK TO COLLECTION</button>
</div>

<div class="progress-container"><div class="progress-bar" id="progress"></div></div>

<nav id="nav">
<button class="nav-btn active" onclick="goHome()"><span class="nav-icon">🏠</span>HOME</button>
<button class="nav-btn" onclick="goHome()"><span class="nav-icon">💌</span>NOTE</button>
<button class="nav-btn" onclick="goHome()"><span class="nav-icon">📅</span>CALENDAR</button>
<button class="nav-btn" onclick="goHome()"><span class="nav-icon">🎵</span>SONGS</button>
</nav>

<script>
const lyricsData=[
["I found a love for me","Darling, just dive right in and follow my lead","Well, I found a girl, beautiful and sweet","Oh, I never knew you were the someone waiting for me","'Cause we were just kids when we fell in love","Not knowing what it was","I will not give you up this time","Darling, just kiss me slow, your heart is all I own","And in your eyes you're holding mine","Baby, I'm dancing in the dark with you between my arms","Barefoot on the grass, listening to our favorite song","When you said you looked a mess, I whispered underneath my breath","But you heard it, darling, you look perfect tonight"],
["When your legs don't work like they used to before","And I can't sweep you off of your feet","Will your mouth still remember the taste of my love","Will your eyes still smile from your cheeks","And, darling, I will be loving you 'til we're 70","And, baby, my heart could still fall as hard at 23","And I'm thinking 'bout how people fall in love in mysterious ways","Maybe just the touch of a hand","Well, me, I fall in love with you every single day","And I just wanna tell you I am","So honey now take me into your loving arms","Kiss me under the light of a thousand stars","Place your head on my beating heart","I'm thinking out loud that we found love right where we are"],
["What would I do without your smart mouth","Drawing me in, and you kicking me out","You've got my head spinning, no kidding, I can't pin you down","What's going on in that beautiful mind","I'm on your magical mystery ride","And I'm so dizzy, don't know what hit me, but I'll be alright","My head's under water but I'm breathing fine","You're crazy and I'm out of my mind","'Cause all of me loves all of you","Love your curves and all your edges, all your perfect imperfections","Give your all to me, I'll give my all to you","You're my end and my beginning, even when I lose I'm winning","'Cause I give you all of me and you give me all of you"],
["We could leave the Christmas lights up 'til January","This is our place, we make the rules","And there's a dazzling haze, a mysterious way about you, dear","Have I known you 20 seconds or 20 years","Can I go where you go","Can we always be this close forever and ever","And, ah, take me out, and take me home","You're my, my, my, my lover","We could let our friends crash in the living room","This is our place, we make the call","And I'm highly suspicious that everyone who sees you wants you","I've loved you three summers now, honey, but I want 'em all","Can I go where you go","Can we always be this close forever and ever","And, ah, take me out, and take me home","You're my, my, my, my lover"],
["Georgia, wrap me up in all your","I want you in your arms","Oh, let me hold you","All night long","I'll be right here in the morning","You'll be right here in the morning","Oh, let me hold you","All night long","Until I found you, I never fell in love","Now I'm singing like baby, baby, I've been singing like baby, baby","Until I found you, I never fell in love","Now I'm singing like baby, baby, I've been singing like baby, baby"]
];
let currentLyrics=[];
let currentLine=0;
let displayInterval=null;

function showLyrics(index){
document.getElementById("home").classList.remove("active");
document.getElementById("lyrics").classList.add("active");
document.getElementById("nav").style.display="none";
document.getElementById("progress").style.display="none";
currentLyrics=lyricsData[index];
currentLine=0;
const container=document.getElementById("lyrics-container");
container.innerHTML="";
currentLyrics.forEach((line,i)=>{const p=document.createElement("div");p.className="lyric-line";p.textContent=line;p.style.animationDelay=(i*0.4)+"s";p.onclick=function(){highlightLine(i)};container.appendChild(p)});
let progress=0;const bar=document.getElementById("progress");bar.style.width="0%";bar.style.display="block";displayInterval=setInterval(()=>{progress+=0.3;bar.style.width=progress+"%";if(progress>=100){clearInterval(displayInterval)}},50);
}

function highlightLine(lineNum){currentLyrics.forEach((line,i)=>{const el=document.getElementById("lyrics-container").children[i];if(i===lineNum){el.classList.add("highlight")}else{el.classList.remove("highlight")}})}

function goHome(){
if(displayInterval)clearInterval(displayInterval);
document.getElementById("lyrics").classList.remove("active");
document.getElementById("home").classList.add("active");
document.getElementById("nav").style.display="flex";
document.getElementById("progress").style.display="block";
document.getElementById("lyrics-container").innerHTML="";
}

let scrollProgress=0;window.addEventListener("scroll",()=>{const winScroll=document.body.scrollTop||document.documentElement.scrollTop;const height=document.documentElement.scrollHeight-document.documentElement.clientHeight;const scrolled=(winScroll/height)*100;document.getElementById("progress").style.width=scrolled+"%"});
</script>
</body>
</html>
